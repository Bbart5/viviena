<!doctype html>
<html lang="pl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Nowa wiadomość ze strony VIVIENA</title>
	</head>
	<body style="margin: 0; padding: 0; background-color: #f7faff; font-family: 'Inter', Arial, sans-serif;">
		<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f7faff; padding: 32px 16px;">
			<tr>
				<td align="center">
					<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; background-color: #ffffff; border: 1px solid #c8d6ee; border-radius: 16px; overflow: hidden;">
						<!-- Header -->
						<tr>
							<td style="background: linear-gradient(135deg, #1f57d6, #5f8cff); padding: 32px 32px 28px;">
								<p style="margin: 0; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #dbe8ff; font-weight: 600;">
									Stowarzyszenie VIVIENA
								</p>
								<h1 style="margin: 8px 0 0; font-size: 22px; line-height: 1.3; color: #ffffff; font-weight: 800;">
									Nowa wiadomość z formularza kontaktowego
								</h1>
							</td>
						</tr>
						<!-- Body -->
						<tr>
							<td style="padding: 32px;">
								<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
									<tr>
										<td style="padding-bottom: 20px;">
											<p style="margin: 0 0 4px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5f7398; font-weight: 700;">
												Imię
											</p>
											<p style="margin: 0; font-size: 16px; color: #122b55;">{{name}}</p>
										</td>
									</tr>
									<tr>
										<td style="padding-bottom: 20px; border-top: 1px solid #edf3ff; padding-top: 20px;">
											<p style="margin: 0 0 4px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5f7398; font-weight: 700;">
												Email
											</p>
											<p style="margin: 0; font-size: 16px; color: #122b55;">
												<a href="mailto:{{email}}" style="color: #1f57d6; text-decoration: none;">{{email}}</a>
											</p>
										</td>
									</tr>
									<tr>
										<td style="border-top: 1px solid #edf3ff; padding-top: 20px;">
											<p style="margin: 0 0 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5f7398; font-weight: 700;">
												Wiadomość
											</p>
											<div style="margin: 0; font-size: 15px; line-height: 1.6; color: #122b55; background-color: #f7faff; border: 1px solid #edf3ff; border-radius: 12px; padding: 16px; white-space: pre-wrap;">{{message}}</div>
										</td>
									</tr>
								</table>
							</td>
						</tr>
						<!-- Footer -->
						<tr>
							<td style="padding: 20px 32px 28px; border-top: 1px solid #edf3ff;">
								<p style="margin: 0; font-size: 12px; line-height: 1.5; color: #5f7398;">
									Ta wiadomość została wysłana automatycznie z formularza kontaktowego na stronie
									VIVIENA. Aby odpowiedzieć, użyj przycisku „Odpowiedz” — trafi ona bezpośrednio do
									nadawcy.
								</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
